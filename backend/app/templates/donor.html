{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm mb-4">
  <div class="card-body">
    <h2>الحالات المتاحة للتبرع</h2>
    <div class="row g-3 mb-3">
      <div class="col-md-4"><select id="filterOrg" class="form-select"></select></div>
      <div class="col-md-4">
        <select id="filterPriority" class="form-select">
          <option value="">كل الأولويات</option>
          <option value="urgent">عاجلة</option>
          <option value="high">مرتفعة</option>
          <option value="medium">متوسطة</option>
          <option value="low">منخفضة</option>
        </select>
      </div>
      <div class="col-md-4"><button id="applyFilters" class="btn btn-outline-primary w-100">تطبيق الفلترة</button></div>
    </div>
    <div id="casesList" class="row g-3"></div>
  </div>
</div>
{% endblock %}
