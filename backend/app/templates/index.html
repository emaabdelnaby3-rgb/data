{% extends "base.html" %}
{% block content %}
<section class="p-4 bg-light rounded-4 shadow-sm">
  <h1 class="mb-3">منصة حكومية موحدة للجمعيات الخيرية</h1>
  <p>النظام يربط 3 جمعيات في قاعدة بيانات واحدة لمنع ازدواج الاستفادة ومتابعة الحالات بشفافية.</p>
  <div class="row g-3 mt-2">
    <div class="col-md-4"><a class="btn btn-primary w-100" href="/register">إنشاء حساب</a></div>
    <div class="col-md-4"><a class="btn btn-outline-primary w-100" href="/donor">صفحة المتبرعين</a></div>
    <div class="col-md-4"><a class="btn btn-outline-dark w-100" href="/admin">لوحة الإدارة</a></div>
  </div>
</section>

<section class="mt-4 p-4 bg-white rounded-4 shadow-sm">
  <h3>تبرع مباشر للجمعية</h3>
  <form id="directDonationForm" class="row g-3">
    <div class="col-md-6">
      <label class="form-label">الجمعية</label>
      <select class="form-select" id="directOrg" required></select>
    </div>
    <div class="col-md-6">
      <label class="form-label">المبلغ</label>
      <input type="number" class="form-control" id="directAmount" min="1" step="0.01" required>
    </div>
    <div class="col-12">
      <button class="btn btn-success">تبرع الآن</button>
    </div>
  </form>
</section>
{% endblock %}
